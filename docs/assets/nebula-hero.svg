  <rect x="752" y="115" width="72" height="25" rx="6" fill="#ffffff" stroke="#dde3ec"/>
  <text x="788" y="132" text-anchor="middle" font-size="12" fill="#1e293b">&lt;&gt; Code</text>
  <text x="858" y="132" text-anchor="middle" font-size="12" fill="#94a3b8">▤ Text</text>

  <!-- code (8-space indents, the notebook's real current state) -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
    <text x="56" y="170" fill="#c2563c"># The Mandelbrot set, rendered as ASCII art — pure standard library.</text>
    <text x="56" y="190" fill="#c2563c"># Each point c = x + yi is iterated under z -&gt; z^2 + c; the character</text>
    <text x="56" y="210" fill="#c2563c"># shows how many steps it takes to escape the disk of radius 2.</text>
    <text x="56" y="250"><tspan fill="#1e293b">WIDTH, HEIGHT, MAX_ITER = </tspan><tspan fill="#0d9488">80</tspan><tspan fill="#1e293b">, </tspan><tspan fill="#0d9488">32</tspan><tspan fill="#1e293b">, </tspan><tspan fill="#0d9488">100</tspan></text>
    <text x="56" y="270"><tspan fill="#1e293b">SHADES = </tspan><tspan fill="#b3403a">" .:-=+*#%@"</tspan><tspan x="240" fill="#c2563c"># darker = escapes slower (deeper in the set)</tspan></text>
    <text x="56" y="310"><tspan fill="#a626a4">def</tspan><tspan fill="#4078f2"> escape_time</tspan><tspan fill="#1e293b">(c):</tspan></text>
    <text x="118" y="330"><tspan fill="#1e293b">z = </tspan><tspan fill="#0d9488">0j</tspan></text>
    <text x="118" y="350"><tspan fill="#a626a4">for</tspan><tspan fill="#1e293b"> n </tspan><tspan fill="#a626a4">in</tspan><tspan fill="#1e293b"> range(MAX_ITER):</tspan></text>
    <text x="181" y="370"><tspan fill="#1e293b">z = z * z + c</tspan></text>
    <text x="181" y="390"><tspan fill="#a626a4">if</tspan><tspan fill="#1e293b"> abs(z) &gt; </tspan><tspan fill="#0d9488">2.0</tspan><tspan fill="#1e293b">:</tspan></text>
    <text x="243" y="410"><tspan fill="#a626a4">return</tspan><tspan fill="#1e293b"> n</tspan></text>
    <text x="118" y="430"><tspan fill="#a626a4">return</tspan><tspan fill="#1e293b"> MAX_ITER</tspan></text>
    <text x="56" y="470"><tspan fill="#a626a4">for</tspan><tspan fill="#1e293b"> row </tspan><tspan fill="#a626a4">in</tspan><tspan fill="#1e293b"> range(HEIGHT):</tspan></text>
    <text x="118" y="490"><tspan fill="#1e293b">y = (row / HEIGHT) * </tspan><tspan fill="#0d9488">2.0</tspan><tspan fill="#1e293b"> - </tspan><tspan fill="#0d9488">1.0</tspan><tspan x="470" fill="#c2563c"># imaginary axis: -1 .. 1</tspan></text>
    <text x="118" y="510"><tspan fill="#1e293b">line = []</tspan></text>
    <text x="118" y="530"><tspan fill="#a626a4">for</tspan><tspan fill="#1e293b"> col </tspan><tspan fill="#a626a4">in</tspan><tspan fill="#1e293b"> range(WIDTH):</tspan></text>
    <text x="181" y="550"><tspan fill="#1e293b">x = (col / WIDTH) * </tspan><tspan fill="#0d9488">3.0</tspan><tspan fill="#1e293b"> - </tspan><tspan fill="#0d9488">2.0</tspan><tspan x="470" fill="#c2563c"># real axis: -2 .. 1</tspan></text>
    <text x="181" y="570"><tspan fill="#1e293b">t = escape_time(complex(x, y))</tspan></text>
    <text x="181" y="590"><tspan fill="#a626a4">if</tspan><tspan fill="#1e293b"> t == MAX_ITER:</tspan></text>
    <text x="243" y="610"><tspan fill="#1e293b">line.append(</tspan><tspan fill="#b3403a">"@"</tspan><tspan fill="#1e293b">)</tspan><tspan x="470" fill="#c2563c"># inside the set</tspan></text>
    <text x="181" y="630"><tspan fill="#a626a4">else</tspan><tspan fill="#1e293b">:</tspan></text>
    <text x="243" y="650"><tspan fill="#1e293b">line.append(SHADES[t * (len(SHADES) - </tspan><tspan fill="#0d9488">1</tspan><tspan fill="#1e293b">) // MAX_ITER])</tspan></text>
    <text x="118" y="670"><tspan fill="#1e293b">print(</tspan><tspan fill="#b3403a">""</tspan><tspan fill="#1e293b">.join(line))</tspan></text>
    <text x="56" y="710" fill="#c2563c">#this is user action here</text>
    <text x="56" y="730" fill="#c2563c">#test test</text>
    <text x="56" y="750" fill="#c2563c">#i will be editing while the agent act</text>
    <text x="56" y="770" fill="#c2563c">#let's see what will happen when i am editing while the agent works</text>
    <text x="56" y="790" fill="#c2563c"># i am still typing typing typ</text>
    <text x="56" y="810" fill="#c2563c">#</text>
  </g>

