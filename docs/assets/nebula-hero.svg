<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 768" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="canvasShadow" x="-4%" y="-4%" width="108%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- App canvas (light, like the real UI; transparent page bg adapts to GitHub themes) -->
  <g filter="url(#canvasShadow)">
    <rect x="14" y="10" width="972" height="730" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  </g>

  <!-- ===== Header ===== -->
  <g>
    <!-- hamburger -->
    <g stroke="#475569" stroke-width="1.6" stroke-linecap="round">
      <line x1="248" y1="32" x2="266" y2="32"/><line x1="248" y1="38" x2="266" y2="38"/><line x1="248" y1="44" x2="266" y2="44"/>
    </g>
    <!-- title -->
    <text x="288" y="42" font-size="19" font-weight="700" fill="#0f172a">test</text>
    <rect x="330" y="27" width="52" height="20" rx="5" fill="#f1f5f9"/>
    <text x="356" y="41" text-anchor="middle" font-size="11" fill="#64748b">.ipynb</text>
    <!-- kernel line -->
    <circle cx="293" cy="62" r="4" fill="#22c55e"/>
    <text x="302" y="66" font-size="12" fill="#475569">Python 3.12 (Nebula)</text>
    <path d="M428 60 l4 5 4-5" fill="none" stroke="#94a3b8" stroke-width="1.4"/>
    <text x="448" y="66" font-size="12" fill="#16a34a">✓ 33m ago</text>
    <text x="522" y="66" font-size="12" fill="#16a34a">#1 0.0s</text>

    <!-- right icon cluster -->
    <text x="622" y="41" font-size="16" fill="#64748b">↶</text>
    <text x="646" y="41" font-size="16" fill="#64748b">↷</text>
    <g stroke="#64748b" stroke-width="1.4" fill="none" stroke-linecap="round">
      <rect x="676" y="28" width="20" height="13" rx="2.5"/> <!-- keyboard -->
      <line x1="681" y1="34.5" x2="683" y2="34.5"/><line x1="687" y1="34.5" x2="689" y2="34.5"/><line x1="692" y1="34.5" x2="694" y2="34.5"/>
    </g>
    <!-- agent-permission (green outlined) -->
    <rect x="708" y="25" width="22" height="20" rx="5" fill="#f0fdf4" stroke="#22c55e"/>
    <line x1="714" y1="39" x2="724" y2="31" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- expand (Maximize2-style) -->
    <g stroke="#64748b" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="750,27 757,27 757,34"/>
      <polyline points="746,43 739,43 739,36"/>
      <line x1="757" y1="27" x2="750" y2="34"/>
      <line x1="739" y1="43" x2="746" y2="36"/>
    </g>
    <!-- settings gear (simple) -->
    <circle cx="770" cy="35" r="6.5" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="770" cy="35" r="2" fill="#64748b"/>
    <!-- Save -->
    <text x="790" y="40" font-size="13" fill="#475569">Save</text>
    <!-- Run All (dark) -->
    <rect x="826" y="22" width="76" height="26" rx="7" fill="#0f172a"/>
    <polygon points="838,29 838,41 848,35" fill="#ffffff"/>
    <text x="853" y="39" font-size="12.5" fill="#ffffff" font-weight="600">Run All</text>
    <!-- Agent (purple) -->
    <rect x="930" y="22" width="72" height="26" rx="7" fill="#9333ea" transform="translate(-22,0)"/>
    <g transform="translate(916,29)">
      <rect x="0" y="2" width="12" height="9.5" rx="2.5" fill="none" stroke="#ffffff" stroke-width="1.4"/>
      <line x1="6" y1="2" x2="6" y2="0" stroke="#ffffff" stroke-width="1.4"/>
      <circle cx="3.6" cy="6.8" r="1.05" fill="#ffffff"/>
      <circle cx="8.4" cy="6.8" r="1.05" fill="#ffffff"/>
    </g>
    <text x="934" y="39" font-size="12.5" fill="#ffffff" font-weight="600">Agent</text>
  </g>

  <!-- ===== Notebook cell card (centered column, like the real app) ===== -->
  <g>
    <rect x="252" y="86" width="496" height="438" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <!-- cell toolbar -->
    <rect x="252" y="86" width="496" height="28" rx="10" fill="#f8fafc"/>
    <rect x="252" y="104" width="496" height="10" fill="#f8fafc"/>
    <line x1="252" y1="114" x2="748" y2="114" stroke="#eef2f7"/>
    <text x="266" y="104" font-size="10.5" fill="#94a3b8" font-family="ui-monospace, Menlo, monospace">#1</text>
    <text x="284" y="104" font-size="10.5" fill="#16a34a" font-family="ui-monospace, Menlo, monospace">[1]</text>
    <polygon points="306,96 306,106 314,101" fill="#64748b"/>
    <g stroke="#94a3b8" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="324,103 328,97 332,103"/>           <!-- up -->
      <polyline points="340,98 344,104 348,98"/>            <!-- down -->
      <rect x="357" y="97" width="8" height="9" rx="1.5"/>  <!-- trash -->
      <line x1="356" y1="97" x2="366" y2="97"/>
      <line x1="376" y1="100.5" x2="384" y2="100.5"/><line x1="380" y1="96.5" x2="380" y2="104.5"/> <!-- plus -->
    </g>
    <!-- Code/Text chips -->
    <rect x="648" y="92" width="52" height="17" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="674" y="104" text-anchor="middle" font-size="10" fill="#334155">&lt;&gt; Code</text>
    <text x="722" y="104" text-anchor="middle" font-size="10" fill="#94a3b8">Text</text>

    <!-- code -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.4">
      <text x="272" y="136" fill="#c2410c"># The Mandelbrot set, rendered as ASCII art — pure standard library.</text>
      <text x="272" y="153" fill="#c2410c"># Each point c = x + yi is iterated under z -&gt; z^2 + c.</text>
      <text x="272" y="178"><tspan fill="#1e293b">WIDTH, HEIGHT, MAX_ITER = </tspan><tspan fill="#0d9488">80, 32, 100</tspan></text>
      <text x="272" y="195"><tspan fill="#1e293b">SHADES = </tspan><tspan fill="#16a34a">" .:-=+*#%@"</tspan><tspan fill="#c2410c" xml:space="preserve">  # darker = escapes slower</tspan></text>
      <text x="272" y="220"><tspan fill="#9333ea">def</tspan><tspan fill="#2563eb"> escape_time</tspan><tspan fill="#1e293b">(c):</tspan></text>
      <text x="272" y="237" xml:space="preserve"><tspan fill="#1e293b">  z = </tspan><tspan fill="#0d9488">0j</tspan></text>
      <text x="272" y="254" xml:space="preserve"><tspan fill="#1e293b">  </tspan><tspan fill="#9333ea">for</tspan><tspan fill="#1e293b"> n </tspan><tspan fill="#9333ea">in</tspan><tspan fill="#1e293b"> range(MAX_ITER):</tspan></text>
      <text x="272" y="271" xml:space="preserve"><tspan fill="#1e293b">    z = z * z + c</tspan></text>
      <text x="272" y="288" xml:space="preserve"><tspan fill="#1e293b">    </tspan><tspan fill="#9333ea">if</tspan><tspan fill="#1e293b"> abs(z) &gt; </tspan><tspan fill="#0d9488">2.0</tspan><tspan fill="#1e293b">:</tspan></text>
      <text x="272" y="305" xml:space="preserve"><tspan fill="#1e293b">      </tspan><tspan fill="#9333ea">return</tspan><tspan fill="#1e293b"> n</tspan></text>
      <text x="272" y="322" xml:space="preserve"><tspan fill="#1e293b">  </tspan><tspan fill="#9333ea">return</tspan><tspan fill="#1e293b"> MAX_ITER</tspan></text>
      <text x="272" y="347"><tspan fill="#9333ea">for</tspan><tspan fill="#1e293b"> row </tspan><tspan fill="#9333ea">in</tspan><tspan fill="#1e293b"> range(HEIGHT):</tspan></text>
      <text x="272" y="364" xml:space="preserve"><tspan fill="#1e293b">  y = (row / HEIGHT) * </tspan><tspan fill="#0d9488">2.0</tspan><tspan fill="#1e293b"> - </tspan><tspan fill="#0d9488">1.0</tspan><tspan fill="#c2410c" xml:space="preserve">   # imaginary axis</tspan></text>
      <text x="272" y="381" xml:space="preserve"><tspan fill="#1e293b">  …</tspan></text>
      <!-- the live-collaboration comments, exactly as they happened -->
      <text x="272" y="406" fill="#c2410c">#this is user action here</text>
      <text x="272" y="423" fill="#c2410c">#i will be editing while the agent act</text>
      <text x="272" y="440" fill="#c2410c"># i am still typing typing typ</text>
      <rect x="466" y="431" width="6.5" height="12" fill="#334155"/>
    </g>

    <!-- output area -->
    <line x1="252" y1="456" x2="748" y2="456" stroke="#eef2f7"/>
    <g font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#334155">
      <text x="448" y="474">.   .@=.</text>
      <text x="448" y="486">==@@@+:.</text>
      <text x="440" y="498">.@@@@@@@@:.</text>
    </g>
    <path d="M262 470 l5 5 5-5" fill="none" stroke="#94a3b8" stroke-width="1.4"/>
    <text x="706" y="514" font-size="10.5" fill="#94a3b8">69ms</text>
  </g>

  <!-- ===== Agent terminal panel ===== -->
  <g>
    <line x1="14" y1="546" x2="986" y2="546" stroke="#e2e8f0"/>
    <!-- tab bar -->
    <rect x="14" y="547" width="972" height="26" fill="#f1f5f9"/>
    <text x="34" y="564" font-size="11" fill="#64748b" font-family="ui-monospace, Menlo, monospace">&gt;_ test</text>
    <rect x="92" y="550" width="74" height="20" rx="5" fill="#ffffff"/>
    <g transform="translate(102,554)">
      <rect x="0" y="2" width="11" height="9" rx="2.5" fill="none" stroke="#7c3aed" stroke-width="1.3"/>
      <line x1="5.5" y1="2" x2="5.5" y2="0" stroke="#7c3aed" stroke-width="1.3"/>
      <circle cx="3.4" cy="6.5" r="0.95" fill="#7c3aed"/>
      <circle cx="7.6" cy="6.5" r="0.95" fill="#7c3aed"/>
    </g>
    <text x="119" y="564" font-size="11" fill="#7c3aed" font-weight="600">Agent</text>
    <circle cx="158" cy="560" r="3" fill="#22c55e"/>
    <text x="972" y="564" text-anchor="end" font-size="12" fill="#94a3b8">×</text>

    <!-- agent active bar -->
    <rect x="14" y="573" width="972" height="22" fill="#f0fdf4"/>
    <circle cx="32" cy="584" r="3.5" fill="#22c55e"/>
    <text x="44" y="588" font-size="11" fill="#166534">Agent active (claude) · driving <tspan font-weight="700">test</tspan> — type instructions here, or use “Fix with agent” on a failing cell</text>
    <line x1="14" y1="595" x2="986" y2="595" stroke="#dcfce7"/>

    <!-- terminal content: the real collaborative-editing exchange -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5">
      <text x="34" y="618" fill="#1e293b">The cell changed since I last read it — each rejection returned your current content, so I</text>
      <text x="34" y="635" fill="#1e293b">re-applied the re-indentation against the latest version and landed it during a pause in your typing.</text>
      <text x="34" y="657" fill="#1e293b"><tspan font-weight="700">Nothing of yours was clobbered.</tspan> The optimistic-locking conflict check forces a re-read and</text>
      <text x="34" y="674" fill="#1e293b">retry — that’s the safety net working as intended.</text>
      <text x="34" y="699" fill="#94a3b8">✻ Worked for 1m 43s</text>
      <text x="34" y="722" fill="#334155">❯ revert it back to 2 spaces</text>
      <rect x="232" y="712" width="7" height="13" fill="#334155"/>
    </g>
  </g>

  <!-- caption -->
  <text x="500" y="762" text-anchor="middle" font-size="12.5" fill="#8b95a9">
    Edit while the agent edits — per-cell conflict checks keep both of you safe · real Jupyter kernels · agents drive via MCP
  </text>
</svg>
